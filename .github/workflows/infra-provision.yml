# Infrastructure Provision Pipeline
#
# MANUAL TRIGGER ONLY (workflow_dispatch) -- security scan + deploy all
# infrastructure in one pipeline run.
#
# Three jobs in sequence:
#   1. VALIDATE      - Format check, init, validate (no AWS needed)
#   2. SECURITY SCAN - tfsec + Checkov strict (must pass before any infra changes)
#   3. PROVISION     - Apply Wave 0 through Wave 2 (+ optional Wave 3)
#
# Provision order matters (dependency chain):
#   0. Wave 0 first (IAM policies only -- updates permissions before anything else)
#   1. Wave 1 second (VPC, SGs, ECR, S3, Cognito, OIDC -- base infrastructure)
#   2. Wave 2 third (RDS depends on VPC subnets + security groups)
#   3. Wave 3 optional (EKS + CloudFront + NAT GW -- only when checkbox is set)
#
# Authentication: OIDC federation (same IAM role as other workflows).
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN  - IAM role ARN from terraform output github_actions_role_arn
#   DB_PASSWORD   - Database master password (same as terraform.tfvars)

name: Infrastructure Provision

on:
  workflow_dispatch:
    inputs:
      include_wave3:
        description: 'Include Wave 3 (EKS + CloudFront, ~$126/month extra)'
        required: false
        type: boolean
        default: false

# OIDC requires these permissions to request and present the JWT token.
permissions:
  id-token: write
  contents: read

# Same concurrency group as terraform.yml -- prevents state conflicts.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  TF_WORKING_DIR: terraform

jobs:
  # ===== Job 1: VALIDATE =====
  # Static checks without AWS credentials.
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Check that all .tf files follow canonical formatting.
      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      # Initialize without backend -- just need providers for validation.
      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  # ===== Job 2: SECURITY SCAN =====
  # tfsec + Checkov with strict mode (soft_fail=false).
  # Must pass before any infrastructure changes are made.
  # No Trufflehog here -- that's for code changes (security-scan.yml).
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # tfsec: catches open security groups, unencrypted storage, etc.
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          soft_fail: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Checkov: CIS benchmarks, AWS best practices.
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          soft_fail: false

  # ===== Job 3: PROVISION =====
  # Applies Wave 0 (IAM), Wave 1 (base), Wave 2 (RDS), and optionally Wave 3 (EKS).
  # Wave 0 ensures the IAM policy has all current permissions BEFORE
  # Terraform creates resources that need those permissions.
  provision:
    name: "Provision Wave 0-2${{ inputs.include_wave3 && '+3' || '' }}"
    runs-on: ubuntu-latest
    needs: security-scan
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # --- Wave 0 apply (IAM policies only) ---
      # Must run BEFORE Wave 1. These inline IAM policies define what
      # the pipeline is allowed to do. If new permissions were added in
      # code, this step activates them in AWS before Terraform tries to
      # create/modify resources that need those permissions.
      # Targets only the policy resources (not the whole OIDC module)
      # to avoid pulling in other resources via Terraform's dependency chain.
      # Idempotent: no-op if nothing changed in the policies.
      - name: Plan Wave 0 (IAM policies)
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform plan \
            -target=module.github_oidc.aws_iam_role_policy.terraform \
            -target=module.github_oidc.aws_iam_role_policy.github_actions \
            -out=tfplan-wave0

      - name: Apply Wave 0 (IAM policies)
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform apply tfplan-wave0

      # --- Wave 1 apply (base infrastructure) ---
      # VPC, Security Groups, ECR, S3, Cognito, and OIDC.
      # OIDC included here for completeness (no-op after Wave 0).
      - name: Plan Wave 1
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform plan \
            -target=module.vpc \
            -target=module.security_groups \
            -target=module.ecr \
            -target=module.s3 \
            -target=module.cognito \
            -target=module.github_oidc \
            -out=tfplan-wave1

      - name: Show plan Wave 1
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show tfplan-wave1

      - name: Apply Wave 1
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform apply tfplan-wave1

      # --- Wave 2 apply (RDS) ---
      # Depends on VPC subnets + security groups from Wave 1.
      - name: Plan Wave 2
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform plan \
            -target=module.rds \
            -out=tfplan-wave2

      - name: Show plan Wave 2
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show tfplan-wave2

      - name: Apply Wave 2
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform apply tfplan-wave2

      # --- Wave 3 apply (EKS + CloudFront) ---
      # Only runs when include_wave3 checkbox is set.
      # Enables NAT Gateway (required for EKS nodes in private subnets).
      # Targets VPC again to add the NAT GW, plus EKS and CloudFront.
      - name: Plan Wave 3 (EKS + CloudFront)
        if: ${{ inputs.include_wave3 }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_enable_nat_gateway: "true"
        run: |
          terraform plan \
            -target=module.vpc \
            -target=module.eks \
            -target=module.cloudfront \
            -out=tfplan-wave3

      - name: Show plan Wave 3
        if: ${{ inputs.include_wave3 }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show tfplan-wave3

      - name: Apply Wave 3
        if: ${{ inputs.include_wave3 }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_enable_nat_gateway: "true"
        run: terraform apply tfplan-wave3

      # --- Show all outputs after successful provision ---
      - name: Show outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output
