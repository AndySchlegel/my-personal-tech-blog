# Deploy Pipeline - Build Docker images and deploy to EKS
#
# MANUAL TRIGGER ONLY (workflow_dispatch) -- nothing deploys unless you
# click "Run workflow" in the GitHub Actions UI.
#
# Three jobs in sequence:
#   1. TEST  - Run ESLint, Prettier, and Jest unit tests (skippable for hotfixes)
#   2. BUILD - Build Docker images and push to ECR (tagged with git SHA + latest)
#   3. DEPLOY - Install ALB controller, apply K8s manifests, roll out images,
#              and optionally initialize the database
#
# Authentication: OIDC federation (no long-lived AWS keys).
# The github-oidc Terraform module creates the IAM role that this workflow assumes.
# The same role created the EKS cluster (via infra-provision.yml), so kubectl
# access works automatically -- no aws-auth ConfigMap changes needed.
#
# 2 GitHub Secrets required: AWS_ROLE_ARN, DB_PASSWORD.
# All other infrastructure values (RDS endpoint, Cognito IDs, ECR URLs,
# subnet IDs, ALB SG, ACM cert, ALB controller role) are read dynamically
# from Terraform state. This makes the pipeline fully reproducible after
# a destroy + apply cycle without manual secret updates.

name: Deploy to EKS

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (for hotfix deploys)'
        required: false
        type: boolean
        default: false
      run_db_init:
        description: 'Initialize database (schema + seed data, first deploy only)'
        required: false
        type: boolean
        default: false

# OIDC requires these permissions to request and present the JWT token.
# id-token: write  -> allows requesting the OIDC JWT from GitHub
# contents: read   -> allows checking out the repository code
permissions:
  id-token: write
  contents: read

# Prevent concurrent deploys to avoid race conditions on the cluster.
# If a new deploy is triggered while one is running, the new one queues.
concurrency:
  group: deploy-eks
  cancel-in-progress: false

# Reusable values shared across jobs.
env:
  AWS_REGION: eu-central-1
  EKS_CLUSTER_NAME: blog-eks-dev
  K8S_NAMESPACE: blog

jobs:
  # ===== Job 1: TEST =====
  # Runs lint, format check, and unit tests.
  # Can be skipped via the "skip_tests" toggle for emergency hotfixes.
  test:
    name: Test
    runs-on: ubuntu-latest
    # Skip this job if the "skip tests" checkbox was checked
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: backend/
        run: npm ci

      - name: Run ESLint
        working-directory: backend/
        run: npm run lint

      - name: Check formatting
        working-directory: backend/
        run: npm run format:check

      - name: Run unit tests
        working-directory: backend/
        run: npm test

  # ===== Job 2: BUILD =====
  # Builds Docker images for frontend and backend, pushes to ECR.
  # Each image gets two tags:
  #   - sha-<7-char-hash> : unique, traceable to the exact commit
  #   - latest            : convenience tag, always points to newest build
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    # Depends on the test job, but must also run when tests were skipped.
    # GitHub Actions treats skipped jobs as non-successful, so without
    # the 'if' condition, skip_tests=true would block the entire pipeline.
    needs: test
    if: ${{ !cancelled() && !failure() }}
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Generate the image tag from the git commit SHA.
      # Short SHA (7 chars) is enough to be unique and human-readable.
      # Example: sha-a1b2c3d
      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # OIDC authentication: exchange GitHub JWT for temporary AWS credentials.
      # This uses the IAM role created by the github-oidc Terraform module.
      # No AWS access keys needed -- the trust policy validates the JWT.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Get a Docker login token for ECR. Valid for 12 hours.
      # This allows docker push to our private ECR repositories.
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push backend image (multi-stage: TypeScript compile + production runtime)
      - name: Build and push backend
        working-directory: backend/
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/blog-backend:$IMAGE_TAG -t $ECR_REGISTRY/blog-backend:latest .
          docker push $ECR_REGISTRY/blog-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/blog-backend:latest

      # Build and push frontend image (nginx + static files)
      - name: Build and push frontend
        working-directory: frontend/
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/blog-frontend:$IMAGE_TAG -t $ECR_REGISTRY/blog-frontend:latest .
          docker push $ECR_REGISTRY/blog-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/blog-frontend:latest

  # ===== Job 3: DEPLOY =====
  # Installs ALB controller (idempotent), applies K8s manifests, rolls out
  # new images, and optionally seeds the database.
  deploy:
    name: "Deploy to EKS${{ inputs.run_db_init && ' + DB Init' || '' }}"
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !cancelled() && !failure() }}
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC authentication (same as build job -- credentials are per-job)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Setup Terraform CLI so we can read outputs from the remote state.
      # terraform_wrapper: false is required -- the wrapper adds extra output
      # that breaks 'terraform output -raw' (which must return clean strings).
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Read all infrastructure values from the Terraform remote state.
      # These replace static GitHub Secrets that would need manual updating
      # after every destroy + apply cycle.
      # refresh-only ensures ALL outputs are up to date in the state file.
      # Without it, new outputs added after a targeted apply (-target) may
      # be missing from state (targeted applies don't refresh all outputs).
      - name: Read infrastructure values from Terraform state
        id: tf
        working-directory: terraform/
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform init -input=false
          terraform apply -refresh-only -auto-approve
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> "$GITHUB_OUTPUT"
          echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> "$GITHUB_OUTPUT"
          echo "cognito_client_id=$(terraform output -raw cognito_client_id)" >> "$GITHUB_OUTPUT"
          echo "public_subnet_ids=$(terraform output -raw public_subnet_ids)" >> "$GITHUB_OUTPUT"
          echo "alb_sg_id=$(terraform output -raw alb_sg_id)" >> "$GITHUB_OUTPUT"
          echo "alb_acm_certificate_arn=$(terraform output -raw alb_acm_certificate_arn)" >> "$GITHUB_OUTPUT"
          echo "ecr_backend_url=$(terraform output -raw ecr_backend_url)" >> "$GITHUB_OUTPUT"
          echo "ecr_frontend_url=$(terraform output -raw ecr_frontend_url)" >> "$GITHUB_OUTPUT"
          echo "vpc_id=$(terraform output -raw vpc_id)" >> "$GITHUB_OUTPUT"
          echo "alb_controller_role_arn=$(terraform output -raw alb_controller_role_arn)" >> "$GITHUB_OUTPUT"
          echo "route53_zone_id=$(terraform output -raw route53_zone_id)" >> "$GITHUB_OUTPUT"
          echo "blog_domain=$(terraform output -raw blog_domain)" >> "$GITHUB_OUTPUT"
          echo "cognito_domain=$(terraform output -raw cognito_domain)" >> "$GITHUB_OUTPUT"
          echo "backend_role_arn=$(terraform output -raw backend_role_arn)" >> "$GITHUB_OUTPUT"

      # Configure kubectl to connect to our EKS cluster.
      # This writes ~/.kube/config with the cluster endpoint and CA cert.
      # After this, all kubectl commands target our cluster.
      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      # Grant local kubectl access to the cluster admin user.
      # The cluster was created by the OIDC role (via infra-provision.yml),
      # so only that role has access by default. This adds the admin IAM user
      # to the aws-auth ConfigMap so we can run kubectl locally for debugging.
      # Only adds mapUsers -- does not touch mapRoles (used by node group).
      - name: Grant local kubectl access
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ADMIN_ARN="arn:aws:iam::${ACCOUNT_ID}:user/andy-admin"

          # Check if already configured
          if kubectl get configmap aws-auth -n kube-system -o jsonpath='{.data.mapUsers}' 2>/dev/null | grep -q "andy-admin"; then
            echo "andy-admin already has kubectl access"
          else
            echo "Adding andy-admin to aws-auth ConfigMap..."
            kubectl get configmap aws-auth -n kube-system -o json | \
              jq --arg arn "$ADMIN_ARN" '.data.mapUsers = "[{\"userarn\": \"" + $arn + "\", \"username\": \"andy-admin\", \"groups\": [\"system:masters\"]}]"' | \
              kubectl apply -f -
            echo "Done -- andy-admin can now use kubectl locally"
          fi

      # Install metrics-server BEFORE the ALB Controller.
      # The ALB Controller installs a mutating webhook that validates all
      # Service resources. If metrics-server is installed AFTER, the webhook
      # rejects the metrics-server Service due to certificate timing issues.
      # --kubelet-insecure-tls is needed because EKS node kubelets use
      # self-signed certificates that metrics-server cannot verify by default.
      - name: Install metrics-server
        run: |
          if kubectl get deployment metrics-server -n kube-system &>/dev/null; then
            echo "metrics-server already installed"
          else
            echo "Installing metrics-server..."
            kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
            echo "Adding --kubelet-insecure-tls flag for EKS compatibility..."
            kubectl patch deployment metrics-server -n kube-system --type=json \
              -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
            echo "Waiting for metrics-server to be ready..."
            kubectl rollout status deployment/metrics-server -n kube-system --timeout=120s
          fi

      # --- AWS Load Balancer Controller (Helm) ---
      # This controller watches for Ingress resources and creates real AWS ALBs.
      # Without it, our Ingress YAML is accepted by Kubernetes but nothing happens.
      # Uses 'helm upgrade --install' which is idempotent:
      #   - First run: installs the controller
      #   - Later runs: updates if chart version changed, no-op otherwise
      # The IRSA role (from Terraform) gives the controller pod permissions
      # to create/manage ALBs without giving the entire node those permissions.
      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update eks
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=${{ env.EKS_CLUSTER_NAME }} \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ steps.tf.outputs.alb_controller_role_arn }} \
            --set region=${{ env.AWS_REGION }} \
            --set vpcId=${{ steps.tf.outputs.vpc_id }} \
            --wait --timeout 5m0s

      # --- Monitoring Stack (Prometheus + Grafana) ---
      # kube-prometheus-stack bundles Prometheus, Grafana, node-exporter,
      # and kube-state-metrics. Provides cluster-wide observability dashboards.
      # Alertmanager disabled (not needed for showcase).
      # Grafana accessible via port-forward: kubectl port-forward -n monitoring svc/monitoring-grafana 3001:80
      - name: Install Prometheus + Grafana monitoring stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update prometheus-community
          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            --namespace monitoring --create-namespace \
            --set prometheus.prometheusSpec.retention=7d \
            --set prometheus.prometheusSpec.resources.requests.cpu=100m \
            --set prometheus.prometheusSpec.resources.requests.memory=256Mi \
            --set prometheus.prometheusSpec.resources.limits.cpu=500m \
            --set prometheus.prometheusSpec.resources.limits.memory=512Mi \
            --set grafana.resources.requests.cpu=50m \
            --set grafana.resources.requests.memory=128Mi \
            --set grafana.resources.limits.cpu=200m \
            --set grafana.resources.limits.memory=256Mi \
            --set grafana.adminPassword=blog-monitoring-2026 \
            --set grafana.service.type=ClusterIP \
            --set alertmanager.enabled=false \
            --set nodeExporter.resources.requests.cpu=25m \
            --set nodeExporter.resources.requests.memory=32Mi \
            --set kubeStateMetrics.resources.requests.cpu=25m \
            --set kubeStateMetrics.resources.requests.memory=32Mi \
            --wait --timeout 5m0s

      # Step 1: Create namespace and apply non-sensitive config.
      # These are safe to apply from the git manifests directly.
      - name: Apply namespace and ConfigMap
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-configmap.yaml

      # Step 1b: Create frontend config for admin auth (Cognito values).
      # This ConfigMap is mounted into the frontend container as /admin/config.js.
      # auth.js reads window.BLOG_CONFIG to get the Cognito domain, pool ID, etc.
      - name: Create frontend admin config
        run: |
          COGNITO_FULL_DOMAIN="${{ steps.tf.outputs.cognito_domain }}.auth.${{ env.AWS_REGION }}.amazoncognito.com"
          kubectl create configmap frontend-admin-config \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=config.js="window.BLOG_CONFIG = {
            cognitoUserPoolId: \"${{ steps.tf.outputs.cognito_user_pool_id }}\",
            cognitoClientId: \"${{ steps.tf.outputs.cognito_client_id }}\",
            cognitoDomain: \"${COGNITO_FULL_DOMAIN}\",
          };" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Step 2: Create secrets with real values.
      # DB_PASSWORD comes from GitHub Secrets (sensitive, not in Terraform state).
      # All other values come from Terraform outputs (read in the step above).
      # Uses --dry-run=client to generate YAML, then pipes to kubectl apply.
      #
      # The DATABASE_URL format: postgresql://user:password@host:5432/dbname
      # RDS_ENDPOINT already includes the port (e.g. blog-rds-dev.abc.rds.amazonaws.com:5432)
      - name: Create secrets
        run: |
          kubectl create secret generic blog-secrets \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=DATABASE_URL="postgresql://bloguser:${{ secrets.DB_PASSWORD }}@${{ steps.tf.outputs.rds_endpoint }}/techblog" \
            --from-literal=COGNITO_USER_POOL_ID="${{ steps.tf.outputs.cognito_user_pool_id }}" \
            --from-literal=COGNITO_CLIENT_ID="${{ steps.tf.outputs.cognito_client_id }}" \
            --from-literal=TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            --from-literal=TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --from-literal=S3_BUCKET_NAME="${{ steps.tf.outputs.s3_bucket_name }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Step 2b: Create backend ServiceAccount with IRSA annotation.
      # This gives the backend pod AWS credentials for Comprehend API calls.
      # IRSA (IAM Roles for Service Accounts) injects a projected token that
      # the AWS SDK automatically uses -- no IMDS needed.
      - name: Create backend ServiceAccount (IRSA)
        run: |
          cat <<YAML | kubectl apply -f -
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: blog-backend
            namespace: ${{ env.K8S_NAMESPACE }}
            annotations:
              eks.amazonaws.com/role-arn: "${{ steps.tf.outputs.backend_role_arn }}"
          YAML

      # Step 3: Apply services (must exist before deployments reference them).
      - name: Apply services
        run: |
          kubectl apply -f k8s/04-backend-service.yaml
          kubectl apply -f k8s/06-frontend-service.yaml

      # Step 4: Apply deployments (pods that run the containers).
      - name: Apply deployments
        run: |
          kubectl apply -f k8s/03-backend-deployment.yaml
          kubectl apply -f k8s/05-frontend-deployment.yaml

      # Step 4b: Apply HorizontalPodAutoscaler (auto-scaling based on CPU).
      # Must come after deployments so the HPA can find its scale targets.
      - name: Apply HPA
        run: kubectl apply -f k8s/10-hpa.yaml

      # Step 5: Update container images to the newly built version.
      # ECR URLs come from Terraform outputs (e.g. 123456789.dkr.ecr.eu-central-1.amazonaws.com/blog-backend).
      # kubectl set image updates the deployment spec with the new tag.
      # This triggers a rolling update -- old pods are replaced one by one.
      - name: Update container images
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          kubectl set image deployment/blog-backend \
            backend=${{ steps.tf.outputs.ecr_backend_url }}:$IMAGE_TAG \
            --namespace ${{ env.K8S_NAMESPACE }}
          kubectl set image deployment/blog-frontend \
            frontend=${{ steps.tf.outputs.ecr_frontend_url }}:$IMAGE_TAG \
            --namespace ${{ env.K8S_NAMESPACE }}

      # Step 6: Apply ingress with real values replacing placeholders.
      # The manifest has REPLACE_* placeholders for values that come from
      # Terraform outputs (read dynamically from the remote state).
      # sed replaces them inline before applying.
      - name: Apply ingress
        run: |
          sed -e "s|REPLACE_SUBNET_IDS|${{ steps.tf.outputs.public_subnet_ids }}|g" \
              -e "s|REPLACE_ALB_SG_ID|${{ steps.tf.outputs.alb_sg_id }}|g" \
              -e "s|REPLACE_ACM_CERT_ARN|${{ steps.tf.outputs.alb_acm_certificate_arn }}|g" \
              k8s/07-ingress.yaml | kubectl apply -f -

      # Step 7: Wait for both deployments to complete their rollout.
      # --timeout=300s gives pods 5 minutes to pull images and start.
      # If a pod fails to start (crash loop, image pull error), this step fails
      # and the workflow reports the deployment as failed.
      - name: Wait for rollout
        run: |
          echo "Waiting for backend rollout..."
          kubectl rollout status deployment/blog-backend --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s
          echo "Waiting for frontend rollout..."
          kubectl rollout status deployment/blog-frontend --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s

      # --- DNS Update: point blog domain to ALB ---
      # After ingress is applied, the ALB Controller creates an AWS ALB.
      # It takes a few minutes for the ALB to get a hostname. Once available,
      # we update Route 53 to point blog.aws.his4irness23.de to the ALB.
      # This overwrites the CloudFront alias record (which has ignore_changes
      # in Terraform, so it won't revert on next terraform apply).
      # ALB hosted zone ID for eu-central-1 is a well-known AWS constant.
      - name: Update DNS to ALB
        env:
          ZONE_ID: ${{ steps.tf.outputs.route53_zone_id }}
          BLOG_DOMAIN: ${{ steps.tf.outputs.blog_domain }}
          ALB_HOSTED_ZONE_ID: Z215JYRZR1TBD5
        run: |
          echo "Waiting for ALB address..."
          ALB_HOST=""
          for i in $(seq 1 30); do
            ALB_HOST=$(kubectl get ingress blog-ingress -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$ALB_HOST" ]; then
              echo "ALB hostname: $ALB_HOST"
              break
            fi
            echo "  Attempt $i/30 -- ALB not ready yet, waiting 10s..."
            sleep 10
          done

          if [ -z "$ALB_HOST" ]; then
            echo "ERROR: ALB address not available after 5 minutes"
            echo "Check ALB Controller logs: kubectl logs -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller"
            exit 1
          fi

          echo "Updating Route 53: $BLOG_DOMAIN -> $ALB_HOST"
          aws route53 change-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --change-batch '{
              "Changes": [{
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "'"$BLOG_DOMAIN"'",
                  "Type": "A",
                  "AliasTarget": {
                    "HostedZoneId": "'"$ALB_HOSTED_ZONE_ID"'",
                    "DNSName": "'"$ALB_HOST"'",
                    "EvaluateTargetHealth": false
                  }
                }
              }]
            }'
          echo "DNS updated successfully!"

      # --- Database initialization (optional, first deploy only) ---
      # Runs schema creation + seed data (11 blog posts, categories, tags)
      # against RDS. Safe to re-run: schema uses IF NOT EXISTS, seed uses
      # DELETE + re-INSERT.
      # Only runs when the "Initialize database" checkbox is checked.
      - name: Apply DB init ConfigMap
        if: ${{ inputs.run_db_init }}
        run: kubectl apply -f k8s/08-db-init-configmap.yaml

      - name: Run DB init job
        if: ${{ inputs.run_db_init }}
        run: |
          kubectl delete job db-init --namespace ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl apply -f k8s/09-db-init-job.yaml

      - name: Wait for DB init
        if: ${{ inputs.run_db_init }}
        run: |
          echo "Waiting for database initialization..."
          kubectl wait --for=condition=complete job/db-init \
            --namespace ${{ env.K8S_NAMESPACE }} --timeout=180s

      # Show DB init logs regardless of success/failure.
      # If psql hangs or crashes, the logs reveal the root cause.
      - name: DB init logs
        if: ${{ inputs.run_db_init && always() }}
        run: |
          echo "=== DB Init Pod Status ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l job-name=db-init
          echo ""
          echo "=== DB Init Pod Logs ==="
          kubectl logs job/db-init --namespace ${{ env.K8S_NAMESPACE }} || echo "No logs available yet"
          echo ""
          echo "=== DB Init Pod Describe ==="
          kubectl describe pod -n ${{ env.K8S_NAMESPACE }} -l job-name=db-init | tail -30

      # Step 8: Print current cluster state for debugging.
      # This appears in the GitHub Actions log for easy troubleshooting.
      - name: Print deployment status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods --namespace ${{ env.K8S_NAMESPACE }} -o wide
          echo ""
          echo "=== Services ==="
          kubectl get svc --namespace ${{ env.K8S_NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress --namespace ${{ env.K8S_NAMESPACE }}
          echo ""
          echo "=== ALB Controller ==="
          kubectl get pods -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller
