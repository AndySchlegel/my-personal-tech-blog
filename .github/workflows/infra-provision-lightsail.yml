# Lightsail Infrastructure Provision Pipeline (terraform-lightsail/)
#
# MANUAL TRIGGER ONLY -- provisions the standalone Lightsail infrastructure
# from the terraform-lightsail/ root module. This is completely independent
# from the EKS terraform/ root (separate state, separate lifecycle).
#
# Single job with three phases:
#   1. VALIDATE - Format check, init, validate (no AWS credentials needed)
#   2. PLAN    - Full plan of all resources (requires AWS credentials)
#   3. APPLY   - Apply the plan (creates/updates all resources at once)
#
# NO wave system needed -- the Lightsail root has no complex dependency chains.
# Terraform resolves module dependencies automatically (e.g., CloudFront
# waits for S3 and Lightsail outputs).
#
# What gets created:
#   - Cognito user pool (admin authentication)
#   - S3 bucket (images, Polly audio, DB backups)
#   - Lightsail instance + static IP attachment + IAM user
#   - CloudFront distribution (HTTPS + caching) + ACM cert (us-east-1)
#   - Route 53 DNS records
#
# NOTE: The static IP itself (63.183.111.225) is passed as a variable,
# NOT managed as a Terraform resource. It was created manually and persists
# independently of this workflow.
#
# Authentication: OIDC federation (same IAM role as other workflows).
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN           - IAM role ARN for OIDC authentication
#   ORIGIN_VERIFY_SECRET   - Secret header for CloudFront origin verification

name: Provision Lightsail Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_provision:
        description: 'Type PROVISION to confirm infrastructure deployment'
        required: true
        type: string
        default: ''

# OIDC requires these permissions to request and present the JWT token.
permissions:
  id-token: write
  contents: read

# Shared concurrency group with all Terraform workflows.
# Prevents state file conflicts when multiple workflows run.
concurrency:
  group: terraform-lightsail
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  TF_WORKING_DIR: terraform-lightsail
  TF_VAR_origin_verify_secret: ${{ secrets.ORIGIN_VERIFY_SECRET }}

jobs:
  provision:
    name: Validate + Plan + Apply
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm_provision == 'PROVISION' }}
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # --- Validate phase (no AWS credentials needed) ---

      # Check that all .tf files follow canonical formatting.
      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      # Initialize without backend for validation only.
      - name: Terraform init (validation)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      # --- Plan + Apply phase (requires AWS credentials) ---

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Re-initialize with real backend for plan and apply.
      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # Plan all resources at once -- no wave system needed.
      # Terraform handles module dependency ordering automatically.
      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Show plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show tfplan

      # Apply the full plan. All modules are created in dependency order:
      # Cognito + S3 first (no dependencies), then Lightsail (needs S3 + Route 53),
      # then CloudFront (needs Lightsail origin + S3 bucket + ACM cert).
      - name: Terraform apply
        id: apply
        continue-on-error: true
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply tfplan

      # --- Workaround: Lightsail CreateInstances provider bug ---
      # The AWS provider's operation waiter for Lightsail can time out
      # even when the instance is successfully created. When this happens:
      # 1. Check if the instance actually exists in AWS
      # 2. Import it into Terraform state
      # 3. Re-apply to reconcile remaining resources (IP attachment, firewall, IAM)
      - name: Handle Lightsail creation timeout
        if: steps.apply.outcome == 'failure'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "Apply failed. Checking if Lightsail instance was created despite timeout..."
          INSTANCE_NAME="blog-lightsail-dev"
          if aws lightsail get-instance --instance-name "$INSTANCE_NAME" --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Instance exists! Importing into Terraform state..."
            terraform import \
              module.lightsail.aws_lightsail_instance.blog \
              "$INSTANCE_NAME" || echo "Already in state"

            echo "Re-applying to reconcile all resources..."
            terraform apply -auto-approve
          else
            echo "Instance does NOT exist. This is a real error."
            exit 1
          fi

      # --- Show all outputs after successful provision ---
      # These values are needed for GitHub Secrets and SSH access.
      - name: Show outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "=== Lightsail Instance ==="
          terraform output lightsail_static_ip
          terraform output lightsail_instance_name
          terraform output lightsail_url
          echo ""
          echo "=== CloudFront ==="
          terraform output cloudfront_distribution_id
          terraform output cloudfront_domain_name
          echo ""
          echo "=== S3 ==="
          terraform output s3_bucket_name
          echo ""
          echo "=== Cognito (for GitHub Secrets) ==="
          terraform output cognito_user_pool_id
          terraform output cognito_client_id
          echo ""
          echo "=== IAM Credentials ==="
          echo "Sensitive values -- run locally to retrieve:"
          echo "  cd terraform-lightsail && terraform output -raw lightsail_backend_access_key_id"
          echo "  cd terraform-lightsail && terraform output -raw lightsail_backend_secret_access_key"
