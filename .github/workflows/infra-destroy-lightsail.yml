# Lightsail Infrastructure Destroy Pipeline (terraform-lightsail/)
#
# MANUAL TRIGGER ONLY -- destroys all Lightsail infrastructure managed by
# the terraform-lightsail/ root module. This is completely independent
# from the EKS terraform/ root (separate state, separate lifecycle).
#
# Single job with two phases:
#   1. PLAN DESTROY - Shows what will be destroyed
#   2. DESTROY      - Executes the destroy
#
# What gets DESTROYED:
#   - Cognito user pool (admin users lost -- re-register after re-provision)
#   - S3 bucket (Polly audio, images, DB backups)
#   - Lightsail instance + key pair + IAM user + access keys
#   - CloudFront distribution + ACM certificate
#   - Route 53 DNS records (except the hosted zone itself)
#
# IMPORTANT: The Lightsail static IP (63.183.111.225) is NOT managed by
# Terraform -- it is passed as a variable, not created as a resource.
# The IP persists after destroy and must be manually released via the
# AWS console or CLI if you are truly decommissioning:
#   aws lightsail release-static-ip --static-ip-name blog-lightsail-ip
#
# Simple destroy: no wave system, no target filtering. Everything in the
# terraform-lightsail/ state gets destroyed in one operation. Terraform
# handles the correct destruction order automatically.
#
# Authentication: OIDC federation (same IAM role as other workflows).
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN           - IAM role ARN for OIDC authentication
#   ORIGIN_VERIFY_SECRET   - Required by Terraform even for destroy plans

name: Destroy Lightsail Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type DESTROY to confirm teardown of all Lightsail infrastructure'
        required: true
        type: string
        default: ''

# OIDC requires these permissions to request and present the JWT token.
permissions:
  id-token: write
  contents: read

# Shared concurrency group with all Terraform-Lightsail workflows.
# Prevents state file conflicts when multiple workflows run.
concurrency:
  group: terraform-lightsail
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  TF_WORKING_DIR: terraform-lightsail
  TF_VAR_origin_verify_secret: ${{ secrets.ORIGIN_VERIFY_SECRET }}

jobs:
  destroy:
    name: Plan Destroy + Destroy
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm_destroy == 'DESTROY' }}
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # --- Plan destroy: show everything that will be removed ---
      # No -target flags needed. The entire terraform-lightsail/ state
      # is destroyed. This is safe because this root only contains
      # Lightsail-specific resources (no shared OIDC or EKS resources).
      - name: Terraform plan destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -destroy -out=tfplan-destroy

      - name: Show destroy plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show tfplan-destroy

      # --- Execute destroy ---
      # Terraform destroys resources in reverse dependency order:
      # Route 53 + CloudFront first, then Lightsail, then S3 + Cognito.
      - name: Terraform destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply tfplan-destroy

      # --- Verify: state should be empty after full destroy ---
      - name: Verify empty state
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "=== Remaining resources in state ==="
          terraform state list || echo "State is empty (expected)."
          echo ""
          echo "NOTE: The Lightsail static IP is NOT in Terraform state."
          echo "It persists after destroy and must be manually released if decommissioning:"
          echo "  aws lightsail release-static-ip --static-ip-name blog-lightsail-ip"
