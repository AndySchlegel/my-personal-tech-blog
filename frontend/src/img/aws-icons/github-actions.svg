<?xml version="1.0" encoding="UTF-8"?>
<svg width="80px" height="80px" viewBox="0 0 80 80" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>Icon-Architecture/64/GitHub-Actions_64</title>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g fill="#24292F">
            <rect x="0" y="0" width="80" height="80"/>
        </g>
        <!-- GitHub Actions logo: circular arrows / workflow icon -->
        <g transform="translate(40, 40)">
            <!-- Outer circular arrow path (top) -->
            <path d="M-2,-22 A22,22 0 0,1 19,11" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
            <!-- Arrow head (top-right) -->
            <polygon points="19,5 19,14 13,8" fill="#FFFFFF"/>

            <!-- Outer circular arrow path (bottom-left) -->
            <path d="M17,13 A22,22 0 0,1 -19,11" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
            <!-- Arrow head (bottom-left) -->
            <polygon points="-19,5 -19,14 -13,8" fill="#FFFFFF"/>

            <!-- Outer circular arrow path (left going up) -->
            <path d="M-17,9 A22,22 0 0,1 0,-22" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
            <!-- Arrow head (top) -->
            <polygon points="-5,-22 4,-22 -1,-16" fill="#FFFFFF"/>

            <!-- Center circle (node) -->
            <circle cx="0" cy="0" r="6" fill="#FFFFFF"/>
            <circle cx="0" cy="0" r="3" fill="#24292F"/>

            <!-- Three workflow nodes -->
            <circle cx="0" cy="-22" r="4" fill="#FFFFFF"/>
            <circle cx="19" cy="11" r="4" fill="#FFFFFF"/>
            <circle cx="-19" cy="11" r="4" fill="#FFFFFF"/>
        </g>
    </g>
</svg>