<?xml version="1.0" encoding="UTF-8"?>
<svg width="80px" height="80px" viewBox="0 0 80 80" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>Icon-Architecture/64/Arch_Elastic-Load-Balancing_64</title>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g fill="#8C4FFF">
            <rect x="0" y="0" width="80" height="80"/>
        </g>
        <!-- Load balancer: incoming arrow splitting to three targets -->
        <g fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1">
            <!-- Left incoming arrow -->
            <polygon points="10,40 22,34 22,37 32,37 32,43 22,43 22,46" fill="#FFFFFF" stroke="none"/>
            <!-- Central node -->
            <circle cx="38" cy="40" r="6" fill="#FFFFFF"/>
            <circle cx="38" cy="40" r="3" fill="#8C4FFF"/>
            <!-- Top branch -->
            <path d="M44,38 L52,22 L56,22" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Middle branch -->
            <line x1="44" y1="40" x2="56" y2="40" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Bottom branch -->
            <path d="M44,42 L52,58 L56,58" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Target boxes -->
            <rect x="56" y="16" width="12" height="12" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
            <rect x="56" y="34" width="12" height="12" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
            <rect x="56" y="52" width="12" height="12" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
            <!-- Arrow heads on branches -->
            <polygon points="56,20 52,22 56,24" fill="#FFFFFF" stroke="none"/>
            <polygon points="56,38 52,40 56,42" fill="#FFFFFF" stroke="none"/>
            <polygon points="56,56 52,58 56,60" fill="#FFFFFF" stroke="none"/>
        </g>
    </g>
</svg>