<?xml version="1.0" encoding="UTF-8"?>
<svg width="80px" height="80px" viewBox="0 0 80 80" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>Icon-Architecture/64/Arch_Amazon-EKS_64</title>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g fill="#FF9900">
            <rect x="0" y="0" width="80" height="80"/>
        </g>
        <!-- Kubernetes wheel: hexagon with inner spokes -->
        <g transform="translate(40, 40)" fill="#FFFFFF">
            <!-- Outer hexagon -->
            <polygon points="0,-24 20.8,-12 20.8,12 0,24 -20.8,12 -20.8,-12" fill="none" stroke="#FFFFFF" stroke-width="3"/>
            <!-- Center circle -->
            <circle cx="0" cy="0" r="6"/>
            <!-- Six spokes from center to vertices -->
            <line x1="0" y1="-6" x2="0" y2="-20" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
            <line x1="5.2" y1="3" x2="17.3" y2="10" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
            <line x1="-5.2" y1="3" x2="-17.3" y2="10" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
            <line x1="0" y1="6" x2="0" y2="20" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
            <line x1="5.2" y1="-3" x2="17.3" y2="-10" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
            <line x1="-5.2" y1="-3" x2="-17.3" y2="-10" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
            <!-- Six node circles at vertices -->
            <circle cx="0" cy="-24" r="4"/>
            <circle cx="20.8" cy="-12" r="4"/>
            <circle cx="20.8" cy="12" r="4"/>
            <circle cx="0" cy="24" r="4"/>
            <circle cx="-20.8" cy="12" r="4"/>
            <circle cx="-20.8" cy="-12" r="4"/>
        </g>
    </g>
</svg>