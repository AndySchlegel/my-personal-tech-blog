<?xml version="1.0" encoding="UTF-8"?>
<svg width="80px" height="80px" viewBox="0 0 80 80" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>Icon-Architecture/64/Arch_Amazon-ECR_64</title>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g fill="#FF9900">
            <rect x="0" y="0" width="80" height="80"/>
        </g>
        <!-- Container box with layers (registry) -->
        <g fill="none" stroke="#FFFFFF" stroke-width="2.5">
            <!-- Outer container box (3D perspective) -->
            <!-- Front face -->
            <rect x="16" y="24" width="36" height="36" rx="2"/>
            <!-- Top face (3D) -->
            <polygon points="16,24 28,14 64,14 52,24"/>
            <!-- Right face (3D) -->
            <polygon points="52,24 64,14 64,50 52,60"/>
            <!-- Layer lines inside front face -->
            <line x1="20" y1="36" x2="48" y2="36"/>
            <line x1="20" y1="48" x2="48" y2="48"/>
        </g>
        <!-- Container/Docker whale hint: small squares in top layer -->
        <g fill="#FFFFFF" opacity="0.8">
            <rect x="22" y="28" width="5" height="5" rx="0.5"/>
            <rect x="29" y="28" width="5" height="5" rx="0.5"/>
            <rect x="36" y="28" width="5" height="5" rx="0.5"/>
            <rect x="43" y="28" width="5" height="5" rx="0.5"/>
        </g>
        <!-- Registry arrow (circular) -->
        <g transform="translate(24, 40)" fill="#FFFFFF">
            <rect x="0" y="2" width="20" height="2.5" rx="1.25"/>
            <rect x="0" y="10" width="16" height="2.5" rx="1.25"/>
        </g>
    </g>
</svg>