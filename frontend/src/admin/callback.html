<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing in... - Blog Admin</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "-apple-system", "sans-serif"],
            },
          },
        },
      };
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tabler Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />

    <!-- Theme toggle (loads early to prevent flash) -->
    <script src="../js/theme.js"></script>

    <!-- ============================================
         V2 Callback Effects System
         Inline CSS -- no styles.css import.
         ============================================ -->
    <style>
      /* --- EFFECT: Lamp / Conic Gradient --- */
      .lamp-effect {
        position: relative;
        overflow: hidden;
      }
      .lamp-effect::before {
        content: "";
        position: absolute;
        top: -50%;
        left: 50%;
        transform: translateX(-50%);
        width: 140%;
        height: 100%;
        background: conic-gradient(
          from 90deg at 50% 0%,
          transparent 40%,
          rgba(56, 189, 248, 0.08) 45%,
          rgba(139, 92, 246, 0.06) 50%,
          rgba(56, 189, 248, 0.08) 55%,
          transparent 60%
        );
        pointer-events: none;
        z-index: 0;
      }
      html:not(.dark) .lamp-effect::before {
        background: conic-gradient(
          from 90deg at 50% 0%,
          transparent 40%,
          rgba(56, 189, 248, 0.05) 45%,
          rgba(139, 92, 246, 0.03) 50%,
          rgba(56, 189, 248, 0.05) 55%,
          transparent 60%
        );
      }

      /* --- Fade In animation --- */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }

      /* --- Gradient spinner border --- */
      .spinner-gradient {
        width: 3rem;
        height: 3rem;
        border-radius: 9999px;
        border: 3px solid transparent;
        border-top-color: #38bdf8;
        border-right-color: #8b5cf6;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* --- Gradient button --- */
      .btn-gradient {
        background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
        transition: all 0.3s ease;
      }
      .btn-gradient:hover {
        box-shadow:
          0 8px 24px rgba(56, 189, 248, 0.3),
          0 4px 12px rgba(139, 92, 246, 0.2);
        transform: translateY(-1px);
      }

      /* --- Dot grid background --- */
      .dot-grid {
        background-image: radial-gradient(
          circle,
          rgba(148, 163, 184, 0.08) 1px,
          transparent 1px
        );
        background-size: 32px 32px;
      }

      /* --- Theme transition smoothing --- */
      html.transition-theme,
      html.transition-theme *,
      html.transition-theme *::before,
      html.transition-theme *::after {
        transition:
          background-color 0.3s ease,
          color 0.3s ease,
          border-color 0.3s ease;
      }
    </style>
  </head>

  <body
    class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans min-h-screen flex items-center justify-center lamp-effect dot-grid"
  >
    <div class="text-center relative z-10">
      <!-- Loading state with gradient spinner -->
      <div id="callback-loading" class="fade-in">
        <div class="spinner-gradient mx-auto mb-5"></div>
        <p class="text-slate-500 dark:text-slate-400 text-sm">
          Signing you in...
        </p>
      </div>

      <!-- Error state (hidden by default) -->
      <div id="callback-error" class="hidden fade-in">
        <div
          class="w-16 h-16 bg-red-500/10 rounded-2xl flex items-center justify-center mx-auto mb-5 border border-red-500/20"
        >
          <i class="ti ti-alert-triangle text-red-500 text-3xl"></i>
        </div>
        <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-2">
          Sign-in Failed
        </h2>
        <p
          id="callback-error-msg"
          class="text-sm text-slate-500 dark:text-slate-400 mb-6 max-w-xs mx-auto"
        ></p>
        <a
          href="/admin/login.html"
          class="btn-gradient inline-flex items-center gap-2 px-5 py-2.5 text-white font-medium rounded-xl text-sm"
        >
          <i class="ti ti-refresh text-base"></i>
          Try Again
        </a>
      </div>
    </div>

    <!-- Admin config (Cognito values, injected by deploy pipeline) -->
    <script src="./config.js"></script>
    <!-- Auth module -->
    <script src="./js/auth.js"></script>

    <script>
      // Process the OAuth callback immediately
      (async function () {
        try {
          await AdminAuth.handleCallback();
        } catch (err) {
          document.getElementById("callback-loading").classList.add("hidden");
          document.getElementById("callback-error").classList.remove("hidden");
          document.getElementById("callback-error-msg").textContent =
            err.message || "An unexpected error occurred.";
        }
      })();
    </script>
  </body>
</html>
