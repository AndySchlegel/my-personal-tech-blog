<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comments - Blog Admin</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "-apple-system", "sans-serif"],
            },
          },
        },
      };
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tabler Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />

    <!-- Theme toggle (loads early to prevent flash) -->
    <script src="../js/theme.js"></script>

    <!-- ============================================
         V2 Admin Effects System
         Inline CSS -- no styles.css import.
         ============================================ -->
    <style>
      /* --- EFFECT: Glowing Card Border --- */
      .glow-card {
        --glow-x: 50%;
        --glow-y: 50%;
        position: relative;
        border-radius: 1rem;
        overflow: hidden;
        transition:
          transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.4s ease;
      }
      .glow-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1.5px;
        background: radial-gradient(
          350px circle at var(--glow-x) var(--glow-y),
          rgba(56, 189, 248, 0.35),
          rgba(139, 92, 246, 0.2),
          transparent 60%
        );
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
        z-index: 2;
      }
      .glow-card:hover::before {
        opacity: 1;
      }
      .glow-card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow:
          0 20px 60px rgba(56, 189, 248, 0.1),
          0 8px 24px rgba(139, 92, 246, 0.08);
      }
      html:not(.dark) .glow-card::before {
        background: radial-gradient(
          350px circle at var(--glow-x) var(--glow-y),
          rgba(56, 189, 248, 0.2),
          rgba(139, 92, 246, 0.12),
          transparent 60%
        );
      }
      html:not(.dark) .glow-card:hover {
        box-shadow:
          0 20px 60px rgba(56, 189, 248, 0.08),
          0 8px 24px rgba(139, 92, 246, 0.05);
      }

      /* --- EFFECT: Lamp / Conic Gradient --- */
      .lamp-effect {
        position: relative;
        overflow: hidden;
      }
      .lamp-effect::before {
        content: "";
        position: absolute;
        top: -50%;
        left: 50%;
        transform: translateX(-50%);
        width: 140%;
        height: 100%;
        background: conic-gradient(
          from 90deg at 50% 0%,
          transparent 40%,
          rgba(56, 189, 248, 0.06) 45%,
          rgba(139, 92, 246, 0.04) 50%,
          rgba(56, 189, 248, 0.06) 55%,
          transparent 60%
        );
        pointer-events: none;
        z-index: 0;
      }
      html:not(.dark) .lamp-effect::before {
        background: conic-gradient(
          from 90deg at 50% 0%,
          transparent 40%,
          rgba(56, 189, 248, 0.04) 45%,
          rgba(139, 92, 246, 0.02) 50%,
          rgba(56, 189, 248, 0.04) 55%,
          transparent 60%
        );
      }

      /* --- Shimmer Pill --- */
      .shimmer-pill {
        position: relative;
        overflow: hidden;
      }
      .shimmer-pill::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.08),
          transparent
        );
        transition: left 0.6s ease;
      }
      .shimmer-pill:hover::after {
        left: 100%;
      }

      /* --- Fade In animation --- */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }

      /* --- Glassmorphism sidebar --- */
      .admin-sidebar-v2 {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 260px;
        z-index: 40;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .dark .admin-sidebar-v2 {
        background: rgba(15, 23, 42, 0.85);
        border-right: 1px solid rgba(51, 65, 85, 0.5);
      }
      html:not(.dark) .admin-sidebar-v2 {
        background: rgba(255, 255, 255, 0.85);
        border-right: 1px solid rgba(226, 232, 240, 0.8);
      }

      /* --- Nav links --- */
      .admin-nav-v2 {
        display: flex;
        align-items: center;
        gap: 0.625rem;
        padding: 0.5rem 0.75rem;
        border-radius: 0.625rem;
        font-size: 0.875rem;
        font-weight: 500;
        transition: all 0.2s ease;
      }
      .dark .admin-nav-v2 {
        color: #94a3b8;
      }
      html:not(.dark) .admin-nav-v2 {
        color: #64748b;
      }
      .admin-nav-v2:hover {
        background: rgba(56, 189, 248, 0.08);
      }
      .dark .admin-nav-v2:hover {
        color: #e2e8f0;
      }
      html:not(.dark) .admin-nav-v2:hover {
        color: #0f172a;
      }
      .admin-nav-v2.active {
        background: rgba(56, 189, 248, 0.12);
      }
      .dark .admin-nav-v2.active {
        color: #38bdf8;
      }
      html:not(.dark) .admin-nav-v2.active {
        color: #0284c7;
        background: rgba(56, 189, 248, 0.1);
      }

      /* --- Main content area --- */
      .admin-main-v2 {
        margin-left: 260px;
        min-height: 100vh;
        padding: 2rem;
      }

      /* --- Mobile handling --- */
      .admin-mobile-bar {
        display: none;
      }

      @media (max-width: 1023px) {
        .admin-sidebar-v2 {
          transform: translateX(-100%);
          transition: transform 0.3s ease;
        }
        .admin-sidebar-v2.admin-sidebar-open {
          transform: translateX(0);
        }
        .admin-main-v2 {
          margin-left: 0;
          padding: 1rem;
          padding-top: 4.5rem;
        }
        .admin-mobile-bar {
          display: block;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: 3.5rem;
          z-index: 30;
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
        }
        .dark .admin-mobile-bar {
          background: rgba(15, 23, 42, 0.85);
          border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        html:not(.dark) .admin-mobile-bar {
          background: rgba(255, 255, 255, 0.85);
          border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
      }

      /* --- Theme transition smoothing --- */
      html.transition-theme,
      html.transition-theme *,
      html.transition-theme *::before,
      html.transition-theme *::after {
        transition:
          background-color 0.3s ease,
          color 0.3s ease,
          border-color 0.3s ease;
      }

      /* --- Custom scrollbar --- */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* --- Dot grid background --- */
      .dot-grid {
        background-image: radial-gradient(
          circle,
          rgba(148, 163, 184, 0.08) 1px,
          transparent 1px
        );
        background-size: 32px 32px;
      }

      /* --- Filter button styling --- */
      .filter-btn {
        display: inline-flex;
        align-items: center;
        padding: 0.375rem 0.875rem;
        border-radius: 9999px;
        font-size: 0.8125rem;
        font-weight: 500;
        transition: all 0.2s ease;
        border: 1px solid transparent;
      }
      .dark .filter-btn {
        color: #94a3b8;
        background: rgba(30, 41, 59, 0.5);
        border-color: rgba(51, 65, 85, 0.5);
      }
      html:not(.dark) .filter-btn {
        color: #64748b;
        background: rgba(248, 250, 252, 0.8);
        border-color: rgba(226, 232, 240, 0.8);
      }
      .filter-btn:hover {
        background: rgba(56, 189, 248, 0.08);
      }
      .filter-btn-active {
        background: rgba(56, 189, 248, 0.12) !important;
        border-color: rgba(56, 189, 248, 0.3) !important;
      }
      .dark .filter-btn-active {
        color: #38bdf8 !important;
      }
      html:not(.dark) .filter-btn-active {
        color: #0284c7 !important;
      }

      /* --- Comment card action buttons --- */
      .admin-action-btn {
        width: 2rem;
        height: 2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        transition: all 0.2s ease;
      }
      .dark .admin-action-btn {
        color: #94a3b8;
      }
      html:not(.dark) .admin-action-btn {
        color: #64748b;
      }

      .admin-action-approve:hover {
        background: rgba(34, 197, 94, 0.1);
        color: #22c55e;
      }
      .admin-action-flag:hover {
        background: rgba(245, 158, 11, 0.1);
        color: #f59e0b;
      }
      .admin-action-delete:hover {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
      }

      /* --- Comment card with glow (no transform on hover to keep layout stable) --- */
      .admin-comment-card {
        --glow-x: 50%;
        --glow-y: 50%;
        position: relative;
        border-radius: 1rem;
        overflow: hidden;
        transition: box-shadow 0.3s ease;
      }
      .admin-comment-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1.5px;
        background: radial-gradient(
          350px circle at var(--glow-x) var(--glow-y),
          rgba(56, 189, 248, 0.3),
          rgba(139, 92, 246, 0.15),
          transparent 60%
        );
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
        z-index: 2;
      }
      .admin-comment-card:hover::before {
        opacity: 1;
      }
      .admin-comment-card:hover {
        box-shadow: 0 8px 24px rgba(56, 189, 248, 0.06);
      }
    </style>
  </head>

  <body
    class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans min-h-screen"
  >
    <!-- ==================== GLASSMORPHISM SIDEBAR ==================== -->
    <aside class="admin-sidebar-v2">
      <div class="flex flex-col h-full">
        <!-- Logo area -->
        <div class="p-5 border-b border-slate-200/50 dark:border-slate-700/50">
          <a href="/admin/index.html" class="flex items-center gap-2.5">
            <div
              class="w-9 h-9 bg-gradient-to-br from-sky-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-sky-500/20"
            >
              <i class="ti ti-terminal-2 text-white text-lg"></i>
            </div>
            <div>
              <span class="font-bold text-slate-900 dark:text-white text-sm">
                Blog Admin
              </span>
              <span
                class="block text-[10px] uppercase tracking-wider text-slate-400 dark:text-slate-500 font-semibold"
              >
                Dashboard
              </span>
            </div>
          </a>
        </div>

        <!-- Dev mode indicator -->
        <div
          id="sidebar-dev-badge"
          class="hidden mx-4 mt-4 px-3 py-1.5 bg-amber-500/10 border border-amber-500/30 rounded-lg text-center"
        >
          <span
            class="text-[11px] font-semibold text-amber-600 dark:text-amber-400 uppercase tracking-wider"
          >
            Dev Mode
          </span>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 p-4 space-y-1">
          <a href="/admin/index.html" class="admin-nav-v2">
            <i class="ti ti-dashboard text-lg"></i>
            Dashboard
          </a>
          <a href="/admin/posts.html" class="admin-nav-v2">
            <i class="ti ti-article text-lg"></i>
            Posts
          </a>
          <a href="/admin/comments.html" class="admin-nav-v2 active">
            <i class="ti ti-message-2 text-lg"></i>
            Comments
          </a>
        </nav>

        <!-- Bottom links -->
        <div
          class="p-4 border-t border-slate-200/50 dark:border-slate-700/50 space-y-1"
        >
          <button
            id="theme-toggle"
            class="admin-nav-v2 w-full text-left"
            aria-label="Toggle dark mode"
          >
            <i id="theme-icon-sun" class="ti ti-sun text-lg"></i>
            <i id="theme-icon-moon" class="ti ti-moon text-lg hidden"></i>
            <span id="theme-label">Light Mode</span>
          </button>
          <a href="../index.html" class="admin-nav-v2">
            <i class="ti ti-arrow-left text-lg"></i>
            Back to Blog
          </a>
          <button
            id="logout-btn"
            class="admin-nav-v2 w-full text-left text-red-400 hover:text-red-300 hover:bg-red-500/10"
          >
            <i class="ti ti-logout text-lg"></i>
            Logout
          </button>
        </div>
      </div>
    </aside>

    <!-- Mobile top bar -->
    <div class="admin-mobile-bar">
      <div class="flex items-center justify-between px-4 h-14">
        <a href="/admin/index.html" class="flex items-center gap-2">
          <div
            class="w-8 h-8 bg-gradient-to-br from-sky-500 to-purple-600 rounded-lg flex items-center justify-center"
          >
            <i class="ti ti-terminal-2 text-white text-base"></i>
          </div>
          <span class="font-bold text-sm text-slate-900 dark:text-white">
            Admin
          </span>
        </a>
        <button
          id="mobile-sidebar-toggle"
          class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
        >
          <i class="ti ti-menu-2 text-xl"></i>
        </button>
      </div>
    </div>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="admin-main-v2 lamp-effect dot-grid">
      <div class="max-w-5xl mx-auto relative z-10">
        <!-- Header -->
        <div class="mb-6 fade-in">
          <h1 class="text-2xl font-extrabold">
            <span class="text-slate-900 dark:text-white">Comm</span
            ><span
              class="bg-gradient-to-r from-sky-500 to-purple-600 bg-clip-text text-transparent"
              >ents</span
            >
          </h1>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
            Moderate reader comments
          </p>
        </div>

        <!-- Filter buttons -->
        <div
          id="comment-filters"
          class="flex flex-wrap gap-2 mb-6 fade-in"
          style="animation-delay: 0.05s"
        >
          <button
            class="filter-btn filter-btn-active shimmer-pill"
            data-status="all"
          >
            All
          </button>
          <button class="filter-btn shimmer-pill" data-status="pending">
            Pending
          </button>
          <button class="filter-btn shimmer-pill" data-status="approved">
            Approved
          </button>
          <button class="filter-btn shimmer-pill" data-status="flagged">
            Flagged
          </button>
          <button class="filter-btn shimmer-pill" data-status="deleted">
            Deleted
          </button>
        </div>

        <!-- Comment list -->
        <div
          id="comment-list"
          class="space-y-3 fade-in"
          style="animation-delay: 0.1s"
        >
          <div
            class="p-6 text-center text-sm text-slate-400 dark:text-slate-500 bg-white/80 dark:bg-slate-800/60 backdrop-blur-sm rounded-xl border border-slate-200/50 dark:border-slate-700/50"
          >
            Loading...
          </div>
        </div>
      </div>
    </main>

    <!-- Admin config (Cognito values, injected by deploy pipeline) -->
    <script src="./config.js"></script>
    <!-- Auth module (must load before comments.js) -->
    <script src="./js/auth.js"></script>
    <script src="./js/comments.js"></script>

    <!-- Mobile sidebar toggle + glow-card mouse tracking -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Mobile sidebar toggle
        var toggle = document.getElementById("mobile-sidebar-toggle");
        var sidebar = document.querySelector(".admin-sidebar-v2");
        if (toggle && sidebar) {
          toggle.addEventListener("click", function () {
            sidebar.classList.toggle("admin-sidebar-open");
          });
        }

        // Glow-card mouse tracking for comment cards
        function attachGlowTracking() {
          document
            .querySelectorAll(".glow-card, .admin-comment-card")
            .forEach(function (card) {
              card.addEventListener("mousemove", function (e) {
                var rect = card.getBoundingClientRect();
                card.style.setProperty(
                  "--glow-x",
                  e.clientX - rect.left + "px",
                );
                card.style.setProperty("--glow-y", e.clientY - rect.top + "px");
              });
            });
        }
        attachGlowTracking();

        // Re-attach when comment list is re-rendered
        var commentList = document.getElementById("comment-list");
        if (commentList) {
          var observer = new MutationObserver(attachGlowTracking);
          observer.observe(commentList, { childList: true });
        }
      });
    </script>
  </body>
</html>
