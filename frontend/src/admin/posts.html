<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posts - Blog Admin</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Tailwind CSS (CDN) -->

      tailwind.config = {
        darkMode: "class",

    <!-- Tabler Icons -->

    />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
    />

    <!-- ============================================
         V2 Admin Effects System
         Inline CSS -- no styles.css import.
         ============================================ -->
    <style>
      /* --- EFFECT: Glowing Card Border --- */
      .glow-card {
        --glow-x: 50%;
        --glow-y: 50%;
        position: relative;
        border-radius: 1rem;
        overflow: hidden;
        transition:
          transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.4s ease;
      }
      .glow-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1.5px;
        background: radial-gradient(
          350px circle at var(--glow-x) var(--glow-y),
          rgba(56, 189, 248, 0.35),
          rgba(139, 92, 246, 0.2),
          transparent 60%
        );
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
        z-index: 2;
      }
      .glow-card:hover::before {
        opacity: 1;
      }
      .glow-card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow:
          0 20px 60px rgba(56, 189, 248, 0.1),
          0 8px 24px rgba(139, 92, 246, 0.08);
      }
      html:not(.dark) .glow-card::before {
        background: radial-gradient(
          350px circle at var(--glow-x) var(--glow-y),
          rgba(56, 189, 248, 0.2),
          rgba(139, 92, 246, 0.12),
          transparent 60%
        );
      }
      html:not(.dark) .glow-card:hover {
        box-shadow:
          0 20px 60px rgba(56, 189, 248, 0.08),
          0 8px 24px rgba(139, 92, 246, 0.05);
      }

      /* --- Static glow-card (no hover transform for editor panels) --- */
      .glow-card-static {
        --glow-x: 50%;
        --glow-y: 50%;
        position: relative;
        border-radius: 1rem;
        overflow: hidden;
      }
      .glow-card-static::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1.5px;
        background: radial-gradient(
          350px circle at var(--glow-x) var(--glow-y),
          rgba(56, 189, 248, 0.35),
          rgba(139, 92, 246, 0.2),
          transparent 60%
        );
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
        z-index: 2;
      }
      .glow-card-static:hover::before {
        opacity: 1;
      }
      html:not(.dark) .glow-card-static::before {
        background: radial-gradient(
          350px circle at var(--glow-x) var(--glow-y),
          rgba(56, 189, 248, 0.2),
          rgba(139, 92, 246, 0.12),
          transparent 60%
        );
      }

      /* --- EFFECT: Lamp / Conic Gradient --- */
      .lamp-effect {
        position: relative;
        overflow: hidden;
      }
      .lamp-effect::before {
        content: "";
        position: absolute;
        top: -50%;
        left: 50%;
        transform: translateX(-50%);
        width: 140%;
        height: 100%;
        background: conic-gradient(
          from 90deg at 50% 0%,
          transparent 40%,
          rgba(56, 189, 248, 0.06) 45%,
          rgba(139, 92, 246, 0.04) 50%,
          rgba(56, 189, 248, 0.06) 55%,
          transparent 60%
        );
        pointer-events: none;
        z-index: 0;
      }
      html:not(.dark) .lamp-effect::before {
        background: conic-gradient(
          from 90deg at 50% 0%,
          transparent 40%,
          rgba(56, 189, 248, 0.04) 45%,
          rgba(139, 92, 246, 0.02) 50%,
          rgba(56, 189, 248, 0.04) 55%,
          transparent 60%
        );
      }

      /* --- Fade In animation --- */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }

      /* --- Section Divider --- */
      .section-divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(56, 189, 248, 0.3),
          rgba(139, 92, 246, 0.3),
          transparent
        );
      }

      /* --- Glassmorphism sidebar --- */
      .admin-sidebar-v2 {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 260px;
        z-index: 40;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .dark .admin-sidebar-v2 {
        background: rgba(15, 23, 42, 0.85);
        border-right: 1px solid rgba(51, 65, 85, 0.5);
      }
      html:not(.dark) .admin-sidebar-v2 {
        background: rgba(255, 255, 255, 0.85);
        border-right: 1px solid rgba(226, 232, 240, 0.8);
      }

      /* --- Nav links --- */
      .admin-nav-v2 {
        display: flex;
        align-items: center;
        gap: 0.625rem;
        padding: 0.5rem 0.75rem;
        border-radius: 0.625rem;
        font-size: 0.875rem;
        font-weight: 500;
        transition: all 0.2s ease;
      }
      .dark .admin-nav-v2 {
        color: #94a3b8;
      }
      html:not(.dark) .admin-nav-v2 {
        color: #64748b;
      }
      .admin-nav-v2:hover {
        background: rgba(56, 189, 248, 0.08);
      }
      .dark .admin-nav-v2:hover {
        color: #e2e8f0;
      }
      html:not(.dark) .admin-nav-v2:hover {
        color: #0f172a;
      }
      .admin-nav-v2.active {
        background: rgba(56, 189, 248, 0.12);
      }
      .dark .admin-nav-v2.active {
        color: #38bdf8;
      }
      html:not(.dark) .admin-nav-v2.active {
        color: #0284c7;
        background: rgba(56, 189, 248, 0.1);
      }

      /* --- Main content area --- */
      .admin-main-v2 {
        margin-left: 260px;
        min-height: 100vh;
        padding: 2rem;
      }

      /* --- Mobile handling --- */
      .admin-mobile-bar {
        display: none;
      }

      @media (max-width: 1023px) {
        .admin-sidebar-v2 {
          transform: translateX(-100%);
          transition: transform 0.3s ease;
        }
        .admin-sidebar-v2.admin-sidebar-open {
          transform: translateX(0);
        }
        .admin-main-v2 {
          margin-left: 0;
          padding: 1rem;
          padding-top: 4.5rem;
        }
        .admin-mobile-bar {
          display: block;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: 3.5rem;
          z-index: 30;
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
        }
        .dark .admin-mobile-bar {
          background: rgba(15, 23, 42, 0.85);
          border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        html:not(.dark) .admin-mobile-bar {
          background: rgba(255, 255, 255, 0.85);
          border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
      }

      /* --- Theme transition smoothing --- */
      html.transition-theme,
      html.transition-theme *,
      html.transition-theme *::before,
      html.transition-theme *::after {
        transition:
          background-color 0.3s ease,
          color 0.3s ease,
          border-color 0.3s ease;
      }

      /* --- Custom scrollbar --- */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* --- Dot grid background --- */
      .dot-grid {
        background-image: radial-gradient(
          circle,
          rgba(148, 163, 184, 0.08) 1px,
          transparent 1px
        );
        background-size: 32px 32px;
      }

      /* --- Gradient button (save post) --- */
      .btn-gradient {
        background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
        transition: all 0.3s ease;
      }
      .btn-gradient:hover {
        box-shadow:
          0 8px 24px rgba(56, 189, 248, 0.3),
          0 4px 12px rgba(139, 92, 246, 0.2);
        transform: translateY(-1px);
      }
      .btn-gradient:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* --- V2 form inputs --- */
      .input-v2 {
        width: 100%;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        border-radius: 0.625rem;
        outline: none;
        transition: all 0.2s ease;
      }
      .dark .input-v2 {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(51, 65, 85, 0.5);
        color: #e2e8f0;
      }
      html:not(.dark) .input-v2 {
        background: rgba(248, 250, 252, 0.8);
        border: 1px solid rgba(226, 232, 240, 0.8);
        color: #0f172a;
      }
      .input-v2:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
      }
      .input-v2::placeholder {
        color: #64748b;
      }

      /* --- Action buttons for table rows --- */
      .action-btn-v2 {
        width: 2rem;
        height: 2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        transition: all 0.2s ease;
      }
      .dark .action-btn-v2 {
        color: #94a3b8;
      }
      html:not(.dark) .action-btn-v2 {
        color: #64748b;
      }
      .action-btn-v2:hover {
        background: rgba(56, 189, 248, 0.1);
      }
      .dark .action-btn-v2:hover {
        color: #38bdf8;
      }
      html:not(.dark) .action-btn-v2:hover {
        color: #0284c7;
      }
      .action-btn-v2.delete:hover {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
      }
    </style>
  </head>

  <body
    class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans min-h-screen"
  >
    <!-- ==================== GLASSMORPHISM SIDEBAR ==================== -->
    <aside class="admin-sidebar-v2">
      <div class="flex flex-col h-full">
        <!-- Logo area -->
        <div class="p-5 border-b border-slate-200/50 dark:border-slate-700/50">
          <a href="/admin/index.html" class="flex items-center gap-2.5">
            <div
              class="w-9 h-9 bg-gradient-to-br from-sky-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-sky-500/20"
            >
              <i class="ti ti-terminal-2 text-white text-lg"></i>
            </div>
            <div>
              <span class="font-bold text-slate-900 dark:text-white text-sm">
                Blog Admin
              </span>
              <span
                class="block text-[10px] uppercase tracking-wider text-slate-400 dark:text-slate-500 font-semibold"
              >
                Dashboard
              </span>
            </div>
          </a>
        </div>

        <!-- Dev mode indicator -->
        <div
          id="sidebar-dev-badge"
          class="hidden mx-4 mt-4 px-3 py-1.5 bg-amber-500/10 border border-amber-500/30 rounded-lg text-center"
        >
          <span
            class="text-[11px] font-semibold text-amber-600 dark:text-amber-400 uppercase tracking-wider"
          >
            Dev Mode
          </span>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 p-4 space-y-1">
          <a href="/admin/index.html" class="admin-nav-v2">
            <i class="ti ti-dashboard text-lg"></i>
            Dashboard
          </a>
          <a href="/admin/posts.html" class="admin-nav-v2 active">
            <i class="ti ti-article text-lg"></i>
            Posts
          </a>
          <a href="/admin/comments.html" class="admin-nav-v2">
            <i class="ti ti-message-2 text-lg"></i>
            Comments
          </a>
        </nav>

        <!-- Bottom links -->
        <div
          class="p-4 border-t border-slate-200/50 dark:border-slate-700/50 space-y-1"
        >
          <button
            id="theme-toggle"
            class="admin-nav-v2 w-full text-left"
            aria-label="Toggle dark mode"
          >
            <i id="theme-icon-sun" class="ti ti-sun text-lg"></i>
            <i id="theme-icon-moon" class="ti ti-moon text-lg hidden"></i>
            <span id="theme-label">Light Mode</span>
          </button>
          <a href="../index.html" class="admin-nav-v2">
            <i class="ti ti-arrow-left text-lg"></i>
            Back to Blog
          </a>
          <button
            id="logout-btn"
            class="admin-nav-v2 w-full text-left text-red-400 hover:text-red-300 hover:bg-red-500/10"
          >
            <i class="ti ti-logout text-lg"></i>
            Logout
          </button>
        </div>
      </div>
    </aside>

    <!-- Mobile top bar -->
    <div class="admin-mobile-bar">
      <div class="flex items-center justify-between px-4 h-14">
        <a href="/admin/index.html" class="flex items-center gap-2">
          <div
            class="w-8 h-8 bg-gradient-to-br from-sky-500 to-purple-600 rounded-lg flex items-center justify-center"
          >
            <i class="ti ti-terminal-2 text-white text-base"></i>
          </div>
          <span class="font-bold text-sm text-slate-900 dark:text-white">
            Admin
          </span>
        </a>
        <button
          id="mobile-sidebar-toggle"
          class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
        >
          <i class="ti ti-menu-2 text-xl"></i>
        </button>
      </div>
    </div>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="admin-main-v2 lamp-effect dot-grid">
      <div class="max-w-6xl mx-auto relative z-10">
        <!-- ===== POST LIST VIEW ===== -->
        <div id="post-list-view" class="fade-in">
          <!-- Header -->
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="text-2xl font-extrabold">
                <span class="text-slate-900 dark:text-white">Po</span
                ><span
                  class="bg-gradient-to-r from-sky-500 to-purple-600 bg-clip-text text-transparent"
                  >sts</span
                >
              </h1>
              <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
                Manage your blog posts
              </p>
            </div>
            <button
              id="new-post-btn"
              class="btn-gradient inline-flex items-center gap-1.5 px-5 py-2.5 text-white text-sm font-semibold rounded-xl"
            >
              <i class="ti ti-plus text-base"></i>
              New Post
            </button>
          </div>

          <!-- Post table -->
          <div
            id="post-list"
            class="glow-card bg-white/80 dark:bg-slate-800/60 backdrop-blur-sm border border-slate-200/50 dark:border-slate-700/50 overflow-hidden"
          >
            <div
              class="p-6 text-center text-sm text-slate-400 dark:text-slate-500"
            >
              Loading...
            </div>
          </div>
        </div>

        <!-- ===== POST EDITOR VIEW (hidden by default) ===== -->
        <div id="post-editor-view" class="hidden fade-in">
          <!-- Editor header -->
          <div class="flex items-center gap-3 mb-6">
            <button
              id="editor-back-btn"
              class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
            >
              <i class="ti ti-arrow-left text-xl"></i>
            </button>
            <div>
              <h1
                id="editor-title"
                class="text-2xl font-extrabold text-slate-900 dark:text-white"
              >
                New Post
              </h1>
              <p
                id="editor-subtitle"
                class="text-sm text-slate-500 dark:text-slate-400 mt-0.5"
              >
                Create a new blog post
              </p>
            </div>
          </div>

          <!-- Metadata card -->
          <div
            class="glow-card-static bg-white/80 dark:bg-slate-800/60 backdrop-blur-sm border border-slate-200/50 dark:border-slate-700/50 p-5 mb-6"
          >
            <h2
              class="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-4 flex items-center gap-1.5"
            >
              <i class="ti ti-settings text-sm"></i>
              Post Settings
            </h2>

            <div class="space-y-4">
              <!-- Title -->
              <div>
                <label
                  class="block mb-1.5 text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                  >Title</label
                >
                <input
                  id="editor-field-title"
                  type="text"
                  class="input-v2"
                  placeholder="Enter post title..."
                />
              </div>

              <!-- Row: Category + Status + Featured -->
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                  <label
                    class="block mb-1.5 text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                    >Category</label
                  >
                  <select id="editor-field-category" class="input-v2">
                    <option value="">Select category...</option>
                  </select>
                </div>
                <div>
                  <label
                    class="block mb-1.5 text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                    >Status</label
                  >
                  <select id="editor-field-status" class="input-v2">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                    <option value="archived">Archived</option>
                  </select>
                </div>
                <div>
                  <label
                    class="block mb-1.5 text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                    >Options</label
                  >
                  <div class="flex items-center h-[38px]">
                    <label class="flex items-center gap-2 cursor-pointer">
                      <input
                        id="editor-field-featured"
                        type="checkbox"
                        class="w-4 h-4 rounded border-slate-300 dark:border-slate-600 text-sky-500 focus:ring-sky-500"
                      />
                      <span class="text-sm text-slate-600 dark:text-slate-300"
                        >Featured post</span
                      >
                    </label>
                  </div>
                </div>
              </div>

              <!-- Excerpt + Tags in two columns -->
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label
                    class="block mb-1.5 text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                  >
                    Excerpt
                    <span
                      class="normal-case font-normal text-slate-400 dark:text-slate-500"
                      >(optional)</span
                    >
                  </label>
                  <input
                    id="editor-field-excerpt"
                    type="text"
                    class="input-v2"
                    placeholder="Short summary for post cards..."
                  />
                </div>
                <div>
                  <label
                    class="block mb-1.5 text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                  >
                    Tags
                    <span
                      class="normal-case font-normal text-slate-400 dark:text-slate-500"
                      >(comma-separated)</span
                    >
                  </label>
                  <input
                    id="editor-field-tags"
                    type="text"
                    class="input-v2"
                    placeholder="e.g. aws, terraform, docker"
                  />
                </div>
              </div>
            </div>
          </div>

          <!-- Side-by-side Markdown editor -->
          <div
            class="glow-card-static bg-white/80 dark:bg-slate-800/60 backdrop-blur-sm border border-slate-200/50 dark:border-slate-700/50 overflow-hidden mb-6"
          >
            <!-- Editor grid: two columns side by side -->
            <div
              class="grid grid-cols-1 lg:grid-cols-2"
              style="min-height: 500px"
            >
              <!-- Write side -->
              <div
                class="flex flex-col border-b lg:border-b-0 lg:border-r border-slate-200/50 dark:border-slate-700/50"
              >
                <div
                  class="flex items-center gap-1.5 px-4 py-2.5 border-b border-slate-200/50 dark:border-slate-700/50 bg-slate-50/50 dark:bg-slate-900/30"
                >
                  <i class="ti ti-code text-xs text-slate-400"></i>
                  <span
                    class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500"
                    >Markdown</span
                  >
                </div>
                <textarea
                  id="editor-field-content"
                  class="flex-1 w-full p-4 text-[13px] leading-relaxed font-mono bg-transparent text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 outline-none resize-none"
                  style="min-height: 450px"
                  placeholder="Write your post in Markdown..."
                ></textarea>
              </div>
              <!-- Preview side -->
              <div class="flex flex-col">
                <div
                  class="flex items-center gap-1.5 px-4 py-2.5 border-b border-slate-200/50 dark:border-slate-700/50 bg-slate-50/50 dark:bg-slate-900/30"
                >
                  <i class="ti ti-eye text-xs text-slate-400"></i>
                  <span
                    class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500"
                    >Preview</span
                  >
                </div>
                <div
                  id="editor-preview"
                  class="flex-1 p-4 overflow-y-auto prose"
                  style="max-height: 500px"
                >
                  <p class="text-slate-400 dark:text-slate-500 text-sm italic">
                    Preview will appear here...
                  </p>
                </div>
              </div>
            </div>
          </div>

          <!-- Save / Cancel buttons -->
          <div class="flex items-center gap-3">
            <button
              id="editor-save-btn"
              class="btn-gradient inline-flex items-center gap-1.5 px-5 py-2.5 text-white text-sm font-semibold rounded-xl"
            >
              <i class="ti ti-device-floppy text-base"></i>
              Save Post
            </button>
            <button
              id="editor-cancel-btn"
              class="inline-flex items-center gap-1.5 px-5 py-2.5 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 border border-slate-200/50 dark:border-slate-700/50 hover:border-slate-300 dark:hover:border-slate-600 rounded-xl transition-colors"
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Admin config (Cognito values, injected by deploy pipeline) -->
    <script src="./config.js"></script>
    <!-- Auth module (must load before posts.js) -->
    <script src="./js/auth.js"></script>
    <script src="./js/posts.js"></script>

    <!-- Mobile sidebar toggle + glow-card mouse tracking -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Mobile sidebar toggle
        var toggle = document.getElementById("mobile-sidebar-toggle");
        var sidebar = document.querySelector(".admin-sidebar-v2");
        if (toggle && sidebar) {
          toggle.addEventListener("click", function () {
            sidebar.classList.toggle("admin-sidebar-open");
          });
        }

        // Glow-card mouse tracking
        function attachGlowTracking() {
          document
            .querySelectorAll(".glow-card, .glow-card-static")
            .forEach(function (card) {
              card.addEventListener("mousemove", function (e) {
                var rect = card.getBoundingClientRect();
                card.style.setProperty(
                  "--glow-x",
                  e.clientX - rect.left + "px",
                );
                card.style.setProperty("--glow-y", e.clientY - rect.top + "px");
              });
            });
        }
        attachGlowTracking();

        // Re-attach when post list is re-rendered
        var postList = document.getElementById("post-list");
        if (postList) {
          var observer = new MutationObserver(attachGlowTracking);
          observer.observe(postList, { childList: true });
        }
      });
    </script>
  </body>
</html>
