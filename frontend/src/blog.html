<!doctype html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Andy Schlegel</title>
    <meta
      name="description"
      content="Tech Blog von Andy Schlegel -- AWS, Kubernetes, Terraform, Homelab und der Weg in die Cloud."
    />

    <!-- Tailwind CSS (CDN for development, will be replaced by build step for production) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Tailwind configuration
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "-apple-system", "sans-serif"],
            },
          },
        },
      };
    </script>

    <!-- Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tabler Icons (4900+ modern icons, 2px stroke) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />

    <!-- Devicon (colored tech/brand icons) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
    />

    <!-- Our custom styles (minimal, Tailwind does the heavy lifting) -->
    <link rel="stylesheet" href="./css/styles.css" />

    <!-- Theme toggle script (loads early to prevent flash of wrong theme) -->
    <script src="./js/theme.js"></script>
  </head>

  <body
    class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col transition-colors"
  >
    <!-- ==================== HEADER ==================== -->
    <header
      class="sticky top-0 z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800"
    >
      <div
        class="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between"
      >
        <!-- Logo (icon only) -->
        <a href="./index.html" class="flex items-center group">
          <div
            class="logo-icon w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center group-hover:bg-sky-400"
          >
            <i class="ti ti-cloud-code text-white text-lg"></i>
          </div>
        </a>

        <!-- Navigation -->
        <nav class="hidden sm:flex items-center gap-6">
          <a
            href="./index.html"
            class="text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors"
            >Home</a
          >
          <a
            href="./about.html"
            class="text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors"
            >About me</a
          >
          <a
            href="./skills.html"
            class="text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors"
            >Skills</a
          >
          <a
            href="./blog.html"
            class="text-sm font-medium text-sky-600 dark:text-sky-400"
            >Blog</a
          >
        </nav>

        <!-- Right side: language toggle + theme toggle + mobile menu -->
        <div class="flex items-center gap-2">
          <!-- Language toggle (DE/EN) -->
          <button
            id="lang-toggle"
            class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white transition-colors"
            aria-label="Toggle language"
            title="Switch language / Sprache wechseln"
          >
            <span id="lang-label" class="text-xs font-bold">DE</span>
          </button>

          <!-- Theme toggle button -->
          <button
            id="theme-toggle"
            class="theme-toggle-btn w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white"
            aria-label="Toggle dark mode"
          >
            <!-- Sun icon (shown in dark mode - click to go light) -->
            <i id="theme-icon-sun" class="ti ti-sun text-xl"></i>
            <!-- Moon icon (shown in light mode - click to go dark) -->
            <i id="theme-icon-moon" class="ti ti-moon text-xl hidden"></i>
          </button>

          <!-- Mobile menu button -->
          <button
            id="mobile-menu-toggle"
            class="sm:hidden w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
            aria-label="Open menu"
          >
            <i class="ti ti-menu-2 text-xl"></i>
          </button>
        </div>
      </div>

      <!-- Mobile navigation (hidden by default) -->
      <nav
        id="mobile-menu"
        class="sm:hidden hidden border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950"
      >
        <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col gap-2">
          <a
            href="./index.html"
            class="text-sm font-medium text-slate-500 dark:text-slate-400 py-2"
            >Home</a
          >
          <a
            href="./about.html"
            class="text-sm font-medium text-slate-500 dark:text-slate-400 py-2"
            >About me</a
          >
          <a
            href="./skills.html"
            class="text-sm font-medium text-slate-500 dark:text-slate-400 py-2"
            >Skills</a
          >
          <a
            href="./blog.html"
            class="text-sm font-medium text-sky-600 dark:text-sky-400 py-2"
            >Blog</a
          >
        </div>
      </nav>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="flex-1">
      <!-- Hero Section -->
      <section
        class="max-w-5xl mx-auto px-4 sm:px-6 pt-12 pb-8 sm:pt-16 sm:pb-10"
      >
        <div class="max-w-2xl">
          <h1
            class="hero-title slide-in-left text-3xl sm:text-4xl font-bold text-slate-900 dark:text-white mb-4"
          >
            Blog
          </h1>
          <!-- Subtitle as quote block with photo -->
          <div
            class="quote-block slide-in-left border-l-4 border-sky-500 bg-slate-100 dark:bg-slate-800/30 rounded-r-xl px-5 py-4 mt-4"
            style="animation-delay: 0.1s; opacity: 0"
          >
            <div class="flex items-start gap-3">
              <img
                src="./img/andy-casual.jpg"
                alt="Andy Schlegel"
                class="w-10 h-10 rounded-full object-cover shrink-0 ring-2 ring-sky-500/20"
                style="object-position: center 30%"
              />
              <p
                class="text-sm sm:text-base text-slate-600 dark:text-slate-300 italic leading-relaxed"
              >
                Meine Reise durch AWS, Kubernetes, Terraform und Security
                &mdash; mit Lektionen aus Code, Containern und Konfigurationen.
              </p>
            </div>
          </div>
        </div>
      </section>

      <!-- Filter Section (search + category pills) -->
      <section class="max-w-5xl mx-auto px-4 sm:px-6 pb-6">
        <!-- Search input -->
        <div class="relative mb-4">
          <i
            class="ti ti-search absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-lg pointer-events-none"
          ></i>
          <input
            id="search-input"
            type="text"
            placeholder="Artikel durchsuchen..."
            class="search-input w-full pl-10 pr-10 py-2.5 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-xl text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 outline-none"
          />
          <button
            id="search-clear"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors hidden"
            aria-label="Clear search"
          >
            <i class="ti ti-x text-lg"></i>
          </button>
        </div>

        <!-- Category filter pills (populated by app.js, "All" is static) -->
        <div id="category-filters" class="flex flex-wrap gap-2">
          <button class="filter-btn filter-btn-active" data-category="">
            All
          </button>
        </div>
      </section>

      <!-- Posts Section -->
      <section class="max-w-5xl mx-auto px-4 sm:px-6 pb-16">
        <!-- Section header with sort toggle + post count -->
        <div class="flex items-center justify-between mb-6">
          <h2
            class="text-xl font-semibold text-slate-900 dark:text-white flex items-center gap-3"
          >
            <span
              class="w-10 h-10 rounded-lg bg-sky-500/10 flex items-center justify-center shrink-0"
            >
              <i class="ti ti-article text-xl text-sky-500"></i>
            </span>
            Blog Posts
          </h2>
          <div class="flex items-center gap-4">
            <button
              id="sort-toggle"
              class="flex items-center gap-1.5 text-xs text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors"
              title="Sortierung ändern"
            >
              <i class="ti ti-arrow-up text-sm"></i>
              <span id="sort-label">Chronologisch</span>
            </button>
            <span
              id="post-count"
              class="text-sm text-slate-400 dark:text-slate-500"
            ></span>
          </div>
        </div>

        <!-- API status message (demo mode / connected) -->
        <div id="api-status" class="mb-4"></div>

        <!-- Loading skeleton (shown while posts load) -->
        <div id="posts-loading" class="grid gap-4 sm:grid-cols-2">
          <!-- Skeleton card 1 -->
          <div
            class="bg-white dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700/50 p-6"
          >
            <div
              class="skeleton h-5 w-20 bg-slate-200 dark:bg-slate-700 rounded-full mb-3"
            ></div>
            <div
              class="skeleton h-6 w-3/4 bg-slate-200 dark:bg-slate-700 rounded mb-2"
            ></div>
            <div
              class="skeleton h-4 w-full bg-slate-200 dark:bg-slate-700 rounded mb-1"
            ></div>
            <div
              class="skeleton h-4 w-2/3 bg-slate-200 dark:bg-slate-700 rounded mb-4"
            ></div>
            <div
              class="skeleton h-3 w-1/3 bg-slate-200 dark:bg-slate-700 rounded"
            ></div>
          </div>
          <!-- Skeleton card 2 -->
          <div
            class="bg-white dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700/50 p-6"
          >
            <div
              class="skeleton h-5 w-20 bg-slate-200 dark:bg-slate-700 rounded-full mb-3"
            ></div>
            <div
              class="skeleton h-6 w-3/4 bg-slate-200 dark:bg-slate-700 rounded mb-2"
            ></div>
            <div
              class="skeleton h-4 w-full bg-slate-200 dark:bg-slate-700 rounded mb-1"
            ></div>
            <div
              class="skeleton h-4 w-2/3 bg-slate-200 dark:bg-slate-700 rounded mb-4"
            ></div>
            <div
              class="skeleton h-3 w-1/3 bg-slate-200 dark:bg-slate-700 rounded"
            ></div>
          </div>
        </div>

        <!-- Post grid (populated by app.js) -->
        <div id="posts-grid" class="grid gap-4 sm:grid-cols-2"></div>
      </section>
    </main>

    <!-- ==================== FOOTER ==================== -->
    <footer
      class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950"
    >
      <div class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
        <div
          class="flex flex-col sm:flex-row items-center justify-between gap-4"
        >
          <!-- Left: copyright -->
          <div
            class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400"
          >
            <i class="ti ti-code text-sky-500"></i>
            <span>2026 Andy Schlegel</span>
          </div>

          <!-- Center: legal links (required in Germany) -->
          <div class="flex items-center gap-4 text-sm">
            <a
              href="./impressum.html"
              class="text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors"
              >Impressum</a
            >
            <a
              href="./datenschutz.html"
              class="text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors"
              >Datenschutz</a
            >
            <a
              href="./haftungsausschluss.html"
              class="text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors"
              >Haftungsausschluss</a
            >
          </div>

          <!-- Right: social links -->
          <div class="flex items-center gap-4">
            <a
              href="https://github.com/AndySchlegel"
              target="_blank"
              rel="noopener noreferrer"
              class="social-link text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white"
            >
              <i class="ti ti-brand-github text-xl"></i>
            </a>
            <a
              href="https://www.linkedin.com/in/andy-schlegel-4874852bb"
              target="_blank"
              rel="noopener noreferrer"
              class="social-link text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white"
            >
              <i class="ti ti-brand-linkedin text-xl"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <!-- Mobile menu toggle script -->
    <script>
      // Simple toggle for the mobile navigation menu
      document.addEventListener("DOMContentLoaded", function () {
        var toggle = document.getElementById("mobile-menu-toggle");
        var menu = document.getElementById("mobile-menu");
        if (toggle && menu) {
          toggle.addEventListener("click", function () {
            menu.classList.toggle("hidden");
          });
        }
      });
    </script>

    <!-- Main app script (loads posts from API) -->
    <script src="./js/lang.js"></script>
    <script src="./js/app.js"></script>

    <!-- Scroll-reveal for static elements (header, search, filters) -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var observer = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add("revealed");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.1 },
        );
        document.querySelectorAll(".reveal").forEach(function (el) {
          observer.observe(el);
        });
      });
    </script>
  </body>
</html>
