# 11-grafana-aws-dashboard.yaml - Custom Grafana dashboard for AWS ML services
#
# Shows character counts for Translate and Polly via CloudWatch.
# Comprehend single-API calls (DetectSentiment) do NOT emit CloudWatch metrics
# (only batch/async jobs do), so Comprehend is monitored via backend logs instead.
#
# Grafana's sidecar auto-discovers ConfigMaps with label grafana_dashboard: "1"
# and loads them as dashboards on startup / refresh.
#
# Requires: CloudWatch data source configured in Grafana (added via deploy.yml)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-aws-ml-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  aws-ml-services.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "refresh": "30s",
      "panels": [
        {
          "title": "Amazon Translate -- Characters",
          "description": "TranslateText character count (blog post translations DE/EN)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
          "targets": [
            {
              "refId": "A",
              "queryMode": "Metrics",
              "namespace": "AWS/Translate",
              "metricName": "CharacterCount",
              "dimensions": {
                "LanguagePair": ["de-en"],
                "Operation": ["TranslateText"]
              },
              "matchExact": true,
              "statistic": "Sum",
              "period": "300",
              "region": "eu-central-1",
              "id": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 30,
                "lineWidth": 1,
                "pointSize": 5
              },
              "unit": "short"
            }
          }
        },
        {
          "title": "Amazon Polly -- Characters",
          "description": "SynthesizeSpeech character count (text-to-speech audio generation)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
          "targets": [
            {
              "refId": "A",
              "queryMode": "Metrics",
              "namespace": "AWS/Polly",
              "metricName": "RequestCharacters",
              "dimensions": {
                "Operation": ["SynthesizeSpeech"]
              },
              "matchExact": true,
              "statistic": "Sum",
              "period": "300",
              "region": "eu-central-1",
              "id": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "orange" },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 30,
                "lineWidth": 1,
                "pointSize": 5
              },
              "unit": "short"
            }
          }
        },
        {
          "title": "AWS ML Services -- Total",
          "description": "Total character counts for Translate and Polly",
          "type": "stat",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
          "targets": [
            {
              "refId": "Translate",
              "queryMode": "Metrics",
              "namespace": "AWS/Translate",
              "metricName": "CharacterCount",
              "dimensions": {
                "LanguagePair": ["de-en"],
                "Operation": ["TranslateText"]
              },
              "matchExact": true,
              "statistic": "Sum",
              "period": "86400",
              "region": "eu-central-1",
              "id": ""
            },
            {
              "refId": "Polly",
              "queryMode": "Metrics",
              "namespace": "AWS/Polly",
              "metricName": "RequestCharacters",
              "dimensions": {
                "Operation": ["SynthesizeSpeech"]
              },
              "matchExact": true,
              "statistic": "Sum",
              "period": "86400",
              "region": "eu-central-1",
              "id": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              },
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["aws", "ml", "custom"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "title": "AWS ML Services (Translate / Polly)",
      "uid": "aws-ml-services",
      "version": 3
    }
